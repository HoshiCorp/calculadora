<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <script src="javascript/index.js" defer></script>
    <title>Sr. Ball</title>

</head>
<body>
    <header>
        <h1>Sr. Ball calcula!</h1>
    </header>
    <main>

        <!-- ================== Calculadora ================== -->
        <div id="calculator">

            <!-- Coroa -->
            <div id="crown">
                <div id="top">
                    <div id="triangleLeft"></div>
                    <div id="triangleMid"></div>
                    <div id="triangleRight"></div>
                </div>

                <div id="bottom">
                    <div id="base"></div>
                    <div id="strip"></div>
                </div>
            </div>
            
            <!-- Itens da calculadora -->
            <div id="calculatorWrapper">

                <!-- Visor -->
                <div id="visor">
                    <input type="text" name="numArea" id="numArea" readonly>
                </div>
                
                <!-- Botões-->
                <div id="btnArea">
                    <button id="backspaceBtn" class="utils">←</button>
                    <button id="clearBtn" class="utils">C</button>
                    <button id="parenthesesBtn" class="utils">()</button>
                    <button id="divisionBtn" class="operators">÷</button>

                    <button class="inputs">7</button>
                    <button class="inputs">8</button>
                    <button class="inputs">9</button>
                    <button id="multBtn" class="operators">x</button>

                    <button class="inputs">4</button>
                    <button class="inputs">5</button>
                    <button class="inputs">6</button>
                    <button id="minusBtn" class="operators">-</button>
                    
                    <button class="inputs">1</button>
                    <button class="inputs">2</button>
                    <button class="inputs">3</button>
                    <button id="addBtn" class="operators">+</button>

                    <button id="sinalBtn" class="inputs">+/-</button>
                    <button class="inputs">0</button>
                    <button id="commaBtn" class="inputs">,</button>
                    <button id="equalBtn">=</button>
                </div>
            </div>
        </div>

    </main>

    <!-- ================== Footer ================== -->
    <footer>
        <div>
            Site criado pela <a href="https://github.com/hoshicorp" target="_blank" rel="external" title="Seja a HoshiCorp no GitHub">HoshiCorp</a>
        </div>
        <div>
            <h2>Membros</h2>
            <p><a href="https://github.com/medina-10" target="_blank" rel="external" title="Conta GitHub da Medina">Medina</a> e <a href="https://github.com/felipetoshio01" target="_blank" rel="external" title="Conta GitHub do Toshio">Toshio</a></p>

        </div>
    </footer>
    
</body>
</html>
