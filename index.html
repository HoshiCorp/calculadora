<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <script src="javascrpit/index.js"></script>
    <title>Sr. Ball</title>

</head>
<body>
    <header>
        <h1>Sr. Ball calcula!</h1>
    </header>
    <main>

        <!-- ================== Calculadora ================== -->
        <div id="calculator">

            <!-- Coroa -->
            <div id="crown">
                <div id="top">
                    <div id="triangleLeft"></div>
                    <div id="triangleMid"></div>
                    <div id="triangleRight"></div>
                </div>

                <div id="bottom">
                    <div id="base"></div>
                    <div id="strip"></div>
                </div>
            </div>
            
            <!-- Itens da calculadora -->
            <div id="calculatorWrapper">

                <!-- Visor -->
                <div id="visor">
                    <input type="text" name="numArea" id="numArea" readonly>
                </div>
                
                <!-- Botões-->
                <div id="btnArea">
                    <button id="backspaceBtn">←</button>
                    <button id="clearBtn">C</button>
                    <button id="parenthesesBtn">()</button>
                    <button id="divisionBtn">÷</button>

                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                    <button id="multBtn">x</button>

                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                    <button id="minusBtn">-</button>

                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                    <button id="addBtn">+</button>
                    
                    <button id="sinalBtn">+/-</button>
                    <button>0</button>
                    <button id="commaBtn">,</button>
                    <button id="equalBtn">=</button>
                </div>
            </div>
        </div>

    </main>
    <footer>Site feito pela HoshiCorp</footer>
    
</body>
</html>
